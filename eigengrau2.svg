<svg
  xmlns='http://www.w3.org/2000/svg'
  width='33' height='33'>

  <filter id='n' x='0' y='0'>
    <feTurbulence
      type='fractalNoise'
      baseFrequency='0.8'
      numOctaves='1'
      stitchTiles='stitch'>
      <animate attributeName='seed' values='0;999;0' begin='0s' dur='333s' repeatCount='indefinite'/>
    </feTurbulence>
  </filter>

  <rect width='33' height='33' filter="url(#n)" opacity='0.2'/>
</svg>
